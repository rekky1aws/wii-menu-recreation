<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="../_style/header.css">
	<link rel="stylesheet" type="text/css" href="../_style/header.css">
	<link rel="stylesheet" type="text/css" href="./style/polar_clock.css">
	<script src="../_script/header.js" type="text/javascript" charset="utf-8" defer></script>
	<script src="./script/polar_clock.js" type="text/javascript" charset="utf-8" defer></script>
	<script>
		// Add tailing / in url if missing to load css and js above 
		if (window.location.href.slice(-1) != '/') {
			window.location.replace(window.location.href+"/");
		}
	</script>
	<title>Polar Clock</title>
</head>
<body>
	<svg width="500" height="500" id="clock">
		<circle
			id="seconds"
			cx="250"
			cy="250"
			r="50"
			fill="none"
			stroke-linecap="round"
			stroke-width="20"
			stroke="black"
			stroke-dasharray="0%, 1000000"
			pathLength="60"
		/>
		<circle
			id="minutes"
			cx="250"
			cy="250"
			r="75"
			fill="none"
			stroke-linecap="round"
			stroke-width="20"
			stroke="red"
			stroke-dasharray="0%, 200%"
			pathLength="60"
		/>
		<circle
			id="hours"
			cx="250"
			cy="250"
			r="100"
			fill="none"
			stroke-linecap="round"
			stroke-width="20"
			stroke="green"
			stroke-dasharray="0%, 200%"
			pathLength="24"
		/>
		<circle
			id="days"
			cx="250"
			cy="250"
			r="125"
			fill="none"
			stroke-linecap="round"
			stroke-width="20"
			stroke="blue"
			stroke-dasharray="0%, 200%"
			pathLength="31"
		/>
		<circle
			id="months"
			cx="250"
			cy="250"
			r="150"
			fill="none"
			stroke-linecap="round"
			stroke-width="20"
			stroke="yellow"
			stroke-dasharray="0%, 200%"
			pathLength="12"
		/>
	</svg>

</body>
</html>
